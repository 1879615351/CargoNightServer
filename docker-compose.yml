services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cargonight
      POSTGRES_USER: cargonight
      POSTGRES_PASSWORD: cargonight_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/20260505000000_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargonight"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://cargonight:cargonight_dev@postgres:5432/cargonight
      JWT_SECRET: cargonight-dev-jwt-secret-key-2026
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
